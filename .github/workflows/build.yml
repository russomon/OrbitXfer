name: Build OrbitXfer

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    if: "!contains(github.ref, '-binary')"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: OrbitXfer-iroh-gui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            OrbitXfer-iroh-cli/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('OrbitXfer-iroh-cli/Cargo.lock') }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Verify RELEASES.md
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME}"
          grep -q "^## ${tag} " RELEASES.md || (echo "RELEASES.md missing entry for ${tag}" && exit 1)

      - name: Build CLI (release)
        working-directory: OrbitXfer-iroh-cli
        run: cargo build --release

      - name: Copy CLI into GUI bin
        shell: bash
        run: |
          mkdir -p OrbitXfer-iroh-gui/bin
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp OrbitXfer-iroh-cli/target/release/orbitxfer-iroh-cli.exe OrbitXfer-iroh-gui/bin/orbitxfer-iroh-cli.exe
          else
            cp OrbitXfer-iroh-cli/target/release/orbitxfer-iroh-cli OrbitXfer-iroh-gui/bin/orbitxfer-iroh-cli
            chmod +x OrbitXfer-iroh-gui/bin/orbitxfer-iroh-cli
          fi

      - name: Install GUI deps
        working-directory: OrbitXfer-iroh-gui
        run: npm ci

      - name: Prepare macOS signing inputs
        if: runner.os == 'macOS'
        shell: bash
        env:
          CSC_LINK_SECRET: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_SECRET: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID_SECRET: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_SECRET: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          signing_ready=false
          notarization_ready=false

          if [[ -n "${CSC_LINK_SECRET}" && -n "${CSC_KEY_PASSWORD_SECRET}" ]]; then
            echo "CSC_LINK=${CSC_LINK_SECRET}" >> "${GITHUB_ENV}"
            echo "CSC_KEY_PASSWORD=${CSC_KEY_PASSWORD_SECRET}" >> "${GITHUB_ENV}"
            signing_ready=true
          else
            echo "macOS code-signing secrets not configured; build will remain unsigned."
          fi

          if [[ -n "${APPLE_API_KEY_SECRET}" && -n "${APPLE_API_KEY_ID_SECRET}" && -n "${APPLE_API_ISSUER_SECRET}" ]]; then
            key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID_SECRET}.p8"
            printf '%s' "${APPLE_API_KEY_SECRET}" > "${key_path}"
            chmod 600 "${key_path}"
            echo "APPLE_API_KEY=${key_path}" >> "${GITHUB_ENV}"
            echo "APPLE_API_KEY_ID=${APPLE_API_KEY_ID_SECRET}" >> "${GITHUB_ENV}"
            echo "APPLE_API_ISSUER=${APPLE_API_ISSUER_SECRET}" >> "${GITHUB_ENV}"
            notarization_ready=true
          else
            echo "macOS notarization secrets not configured; build will not be notarized."
          fi

          echo "ORBITXFER_MAC_SIGNING_READY=${signing_ready}" >> "${GITHUB_ENV}"
          echo "ORBITXFER_MAC_NOTARIZATION_READY=${notarization_ready}" >> "${GITHUB_ENV}"

      - name: Require macOS signing for tagged releases
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          [[ "${ORBITXFER_MAC_SIGNING_READY}" == "true" ]] || (echo "Tagged macOS releases require CSC_LINK and CSC_KEY_PASSWORD secrets." && exit 1)
          [[ "${ORBITXFER_MAC_NOTARIZATION_READY}" == "true" ]] || (echo "Tagged macOS releases require APPLE_API_KEY, APPLE_API_KEY_ID, and APPLE_API_ISSUER secrets." && exit 1)

      - name: Build GUI (mac)
        if: runner.os == 'macOS'
        working-directory: OrbitXfer-iroh-gui
        run: npm run build:mac

      - name: Verify signed + notarized app (mac)
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        working-directory: OrbitXfer-iroh-gui
        run: npm run verify:mac:release

      - name: Build GUI (win)
        if: runner.os == 'Windows'
        working-directory: OrbitXfer-iroh-gui
        run: npm run build:win

      - name: Build GUI (linux)
        if: runner.os == 'Linux'
        working-directory: OrbitXfer-iroh-gui
        run: npm run build:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OrbitXfer-${{ runner.os }}
          path: OrbitXfer-iroh-gui/dist/

  release:
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-binary')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
